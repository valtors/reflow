name: 🐛 Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below.
  - type: input
    id: version
    attributes:
      label: fluidity-ts version
      description: What version are you using?
      placeholder: "1.1.0"
    validations:
      required: true
  - type: dropdown
    id: entry-point
    attributes:
      label: Entry point
      description: Which part of fluidity-ts is affected?
      options:
        - core
        - react
        - vue
        - svelte
        - styles
        - server
        - testing
        - tailwind
    validations:
      required: true
  - type: dropdown
    id: framework
    attributes:
      label: Framework
      options:
        - React
        - Next.js
        - Vue 3
        - Nuxt 3
        - Svelte 5
        - SvelteKit
        - Vanilla TypeScript
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: "Node version, browser, OS"
      placeholder: "Node 20, Chrome 125, macOS 14"
