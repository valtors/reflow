name: 🐛 Bug Report
description: Report a bug or unexpected behavior in reflow
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide as much detail as possible so we can reproduce and fix it.
  - type: input
    id: version
    attributes:
      label: reflow version
      description: What version are you using?
      placeholder: "1.1.0"
    validations:
      required: true
  - type: dropdown
    id: framework
    attributes:
      label: Framework
      description: Which framework are you using reflow with?
      options:
        - React
        - Vue
        - Svelte
        - Angular
        - Solid
        - Lit
        - Vanilla
    validations:
      required: true
  - type: dropdown
    id: ssr-environment
    attributes:
      label: SSR environment
      description: Which SSR or app environment are you using?
      options:
        - Next.js
        - Nuxt
        - SvelteKit
        - Remix
        - Astro
        - None
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      description: Which browser and version are affected?
      placeholder: "Chrome 136, Firefox 138, Safari 18"
    validations:
      required: true
  - type: input
    id: reproduction-link
    attributes:
      label: Reproduction link
      description: Link to a minimal reproduction repository, StackBlitz, CodeSandbox, or similar.
      placeholder: "https://..."
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: What happened instead of what you expected?
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any extra context, screenshots, console output, or setup details that may help.
