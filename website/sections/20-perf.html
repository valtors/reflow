<style>
  .skip-link {
    position: absolute;
    top: 1rem;
    left: 1rem;
    z-index: 1000;
    padding: 0.75rem 1rem;
    border-radius: 9999px;
    background: #ffffff;
    color: #0a0a0a;

    text-decoration: none;

    transition: transform 0.2s ease;
  }

  .skip-link:focus {
    transform: translateY(0);

  }

  .perf-loader {
    position: fixed;
    inset: 0;
    z-index: 999;
    display: grid;
    place-items: center;
    gap: 0.875rem;
    background: rgba(10, 10, 10, 0.92);
    color: #ffffff;
    transition: opacity 0.25s ease, visibility 0.25s ease;
  }

  .perf-loader__spinner {
    width: 2.75rem;
    height: 2.75rem;
    border: 3px solid rgba(255, 255, 255, 0.2);
    border-top-color: #22d3ee;
    border-radius: 9999px;
    animation: perf-spin 0.8s linear infinite;
  }

  .perf-loader[hidden] {
    display: none;
  }

  html:not(.is-loading) .perf-loader {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  @keyframes perf-spin {
    to {
      transform: rotate(360deg);
    }
  }

  @media (prefers-reduced-motion: reduce) {
    html {
      scroll-behavior: auto !important;
    }

    *,
    *::before,
    *::after {
      animation: none !important;
      transition: none !important;
    }
  }
</style>

<!-- BODY END SNIPPET: hide loader after first paint -->
<script>
  const finishPerfLoading = () => {
    document.documentElement.classList.remove('is-loading');
    document.querySelector('.perf-loader')?.setAttribute('hidden', 'hidden');
  };

  if (document.readyState === 'complete') {
    finishPerfLoading();
  } else {
    window.addEventListener('load', finishPerfLoading, { once: true });
  }
</script>
