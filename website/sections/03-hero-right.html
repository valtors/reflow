<div class="reveal" style="--delay: 180ms">
  <div class="hero-grid noise relative min-h-[420px] overflow-hidden rounded-[2rem] border border-cyan/20 bg-[radial-gradient(circle_at_top,_rgba(34,211,238,0.2),_rgba(8,12,24,0.92)_38%,_rgba(2,6,23,0.98)_100%)] p-5 shadow-glow sm:p-7">
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_18%,_rgba(34,211,238,0.14),_transparent_42%)]"></div>
    <div class="absolute inset-x-5 top-5 z-10 flex flex-wrap gap-3 text-[11px] font-medium uppercase tracking-[0.25em] text-mist sm:inset-x-7 sm:top-7">
      <div class="rounded-full border border-white/10 bg-white/5 px-3 py-2 backdrop-blur-sm">320px xs</div>
      <div class="rounded-full border border-white/10 bg-white/5 px-3 py-2 backdrop-blur-sm">640px sm</div>
      <div class="rounded-full border border-cyan/30 bg-cyan/10 px-3 py-2 text-cyan shadow-[0_0_24px_rgba(34,211,238,0.18)] backdrop-blur-sm">768px md</div>
      <div class="rounded-full border border-white/10 bg-white/5 px-3 py-2 backdrop-blur-sm">1024px lg</div>
      <div class="rounded-full border border-white/10 bg-white/5 px-3 py-2 backdrop-blur-sm">1440px xl</div>
    </div>

    <div class="absolute inset-x-5 top-24 z-10 rounded-3xl border border-white/10 bg-black/45 px-4 py-3 font-['JetBrains_Mono'] text-xs text-mist shadow-[inset_0_1px_0_rgba(255,255,255,0.04)] backdrop-blur-md sm:inset-x-7">
      <div class="flex items-center justify-between gap-3">
        <span class="text-cyan">useBreakpoint()</span>
        <span>active: <span class="text-white">&quot;md&quot;</span></span>
      </div>
      <div class="mt-3 h-px w-full bg-gradient-to-r from-transparent via-cyan/40 to-transparent"></div>
      <div class="mt-3 grid grid-cols-[auto_1fr] gap-x-3 gap-y-2 text-[10px] uppercase tracking-[0.28em] text-mist/80">
        <span>status</span>
        <span class="text-cyan">synced</span>
        <span>match</span>
        <span class="text-white">768px ≤ viewport &lt; 1024px</span>
      </div>
    </div>

    <div class="bp-line" style="left: 14%"><span>xs</span></div>
    <div class="bp-line" style="left: 32%"><span>sm</span></div>
    <div class="bp-line" style="left: 50%"><span>md</span></div>
    <div class="bp-line" style="left: 68%"><span>lg</span></div>
    <div class="bp-line" style="left: 86%"><span>xl</span></div>

    <div class="bp-wave"></div>
    <div class="scanline"></div>
    <div class="float-orb one"></div>
    <div class="float-orb two"></div>
    <div class="float-orb three"></div>

    <div class="absolute inset-x-5 bottom-6 z-10 grid gap-4 sm:inset-x-7 sm:grid-cols-3">
      <div class="rounded-2xl border border-white/10 bg-black/45 p-4 backdrop-blur-sm">
        <div class="text-xs uppercase tracking-[0.3em] text-mist">Viewport</div>
        <div class="mt-2 text-2xl font-bold text-white">768 × 1024</div>
      </div>
      <div class="rounded-2xl border border-cyan/20 bg-cyan/10 p-4 backdrop-blur-sm">
        <div class="text-xs uppercase tracking-[0.3em] text-cyan/80">Hydration</div>
        <div class="mt-2 text-2xl font-bold text-white">0 warnings</div>
      </div>
      <div class="rounded-2xl border border-orange-400/20 bg-orange-500/10 p-4 backdrop-blur-sm">
        <div class="text-xs uppercase tracking-[0.3em] text-orange-200">Bundle</div>
        <div class="mt-2 text-2xl font-bold text-white">&lt; 3KB gz</div>
      </div>
    </div>
  </div>
</div>
