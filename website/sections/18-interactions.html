<script>
document.addEventListener('DOMContentLoaded', () => {
  const body = document.body;
  const scrollProgress = document.querySelector('.scroll-progress');
  const mobileMenu = document.querySelector('#mobile-menu');
  const hamburgerBtn = document.querySelector('#hamburger-btn');
  const typewriterTarget = document.querySelector('#typewriter-text');

  const revealElements = document.querySelectorAll('.reveal');
  if (revealElements.length) {
    const revealObserver = new IntersectionObserver(
      (entries, observer) => {
        entries.forEach((entry) => {
          if (!entry.isIntersecting) {
            return;
          }

          entry.target.classList.add('is-visible');
          observer.unobserve(entry.target);
        });
      },
      { threshold: 0.16 }
    );

    revealElements.forEach((element) => revealObserver.observe(element));
  }

  const counterElements = document.querySelectorAll('[data-counter]');
  if (counterElements.length) {
    const easeOutCubic = (progress) => 1 - Math.pow(1 - progress, 3);

    const animateCounter = (element) => {
      if (element.dataset.counted === 'true') {
        return;
      }

      const targetValue = Number(element.dataset.counter);
      if (!Number.isFinite(targetValue)) {
        return;
      }

      const prefix = element.dataset.prefix ?? '';
      const suffix = element.dataset.suffix ?? '';
      const decimals = Number.isInteger(targetValue)
        ? 0
        : (String(element.dataset.counter).split('.')[1] || '').length;
      const startTime = performance.now();
      element.dataset.counted = 'true';

      const updateValue = (currentValue) => {
        const formattedValue = decimals
          ? currentValue.toFixed(decimals)
          : Math.round(currentValue).toString();
        element.textContent = `${prefix}${formattedValue}${suffix}`;
      };

      const tick = (now) => {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / 1400, 1);
        const easedProgress = easeOutCubic(progress);
        const currentValue = targetValue * easedProgress;

        updateValue(progress === 1 ? targetValue : currentValue);

        if (progress < 1) {
          requestAnimationFrame(tick);
        }
      };

      updateValue(0);
      requestAnimationFrame(tick);
    };

    const counterObserver = new IntersectionObserver(
      (entries, observer) => {
        entries.forEach((entry) => {
          if (!entry.isIntersecting) {
            return;
          }

          animateCounter(entry.target);
          observer.unobserve(entry.target);
        });
      },
      { threshold: 0.45 }
    );

    counterElements.forEach((element) => counterObserver.observe(element));
  }

  document.querySelectorAll('[data-copy]').forEach((button) => {
    let resetTimer;
    const originalLabel = button.textContent;

    button.addEventListener('click', async () => {
      const textToCopy = button.dataset.copy ?? '';
      if (!textToCopy) {
        return;
      }

      try {
        await navigator.clipboard.writeText(textToCopy);
        button.textContent = 'Copied';
        clearTimeout(resetTimer);
        resetTimer = window.setTimeout(() => {
          button.textContent = originalLabel;
        }, 1800);
      } catch (error) {
        console.error('Copy failed:', error);
      }
    });
  });

  const tabButtons = document.querySelectorAll('.tab-button');
  const tabPanels = document.querySelectorAll('.tab-panel[data-panel]');
  if (tabButtons.length && tabPanels.length) {
    tabButtons.forEach((button) => {
      button.addEventListener('click', () => {
        const targetPanel =
          button.dataset.tab ||
          button.dataset.panel ||
          button.getAttribute('aria-controls') ||
          button.dataset.target?.replace(/^#/, '');

        if (!targetPanel) {
          return;
        }

        tabButtons.forEach((item) => item.classList.remove('active'));
        tabPanels.forEach((panel) => panel.classList.remove('active', 'is-visible'));

        button.classList.add('active');
        const activePanel = document.querySelector(`.tab-panel[data-panel="${targetPanel}"]`);
        activePanel?.classList.add('active', 'is-visible');
      });
    });
  }

  const faqButtons = document.querySelectorAll('.faq-item button');
  if (faqButtons.length) {
    faqButtons.forEach((button) => {
      button.addEventListener('click', () => {
        const faqItem = button.closest('.faq-item');
        if (!faqItem) {
          return;
        }

        const isOpen = faqItem.classList.contains('open');
        document.querySelectorAll('.faq-item.open').forEach((item) => item.classList.remove('open'));
        if (!isOpen) {
          faqItem.classList.add('open');
        }
      });
    });
  }

  document.querySelectorAll('[data-magnetic]').forEach((element) => {
    element.addEventListener('mousemove', (event) => {
      const rect = element.getBoundingClientRect();
      const offsetX = event.clientX - (rect.left + rect.width / 2);
      const offsetY = event.clientY - (rect.top + rect.height / 2);

      element.style.transition = 'transform 0.1s ease-out';
      element.style.transform = `translate(${offsetX * 0.15}px, ${offsetY * 0.15}px)`;
    });

    element.addEventListener('mouseleave', () => {
      element.style.transition = 'transform 0.3s ease';
      element.style.transform = 'translate(0, 0)';
    });
  });

  document.querySelectorAll('[data-tilt]').forEach((element) => {
    element.addEventListener('mousemove', (event) => {
      const rect = element.getBoundingClientRect();
      const relativeX = (event.clientX - rect.left) / rect.width;
      const relativeY = (event.clientY - rect.top) / rect.height;
      const rotateY = (relativeX - 0.5) * 12;
      const rotateX = (0.5 - relativeY) * 12;

      element.style.transition = 'transform 0.08s linear';
      element.style.transform = `perspective(800px) rotateY(${rotateY.toFixed(2)}deg) rotateX(${rotateX.toFixed(2)}deg)`;
    });

    element.addEventListener('mouseleave', () => {
      element.style.transition = 'transform 0.35s ease';
      element.style.transform = 'none';
    });
  });

  document.addEventListener('mousemove', (event) => {
    body.style.setProperty('--mouse-x', `${event.clientX}px`);
    body.style.setProperty('--mouse-y', `${event.clientY}px`);
  });

  const updateScrollProgress = () => {
    if (!scrollProgress) {
      return;
    }

    const scrollTop = window.scrollY;
    const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
    const progress = scrollHeight > 0 ? (scrollTop / scrollHeight) * 100 : 0;
    scrollProgress.style.width = `${Math.min(Math.max(progress, 0), 100)}%`;
  };

  window.addEventListener('scroll', updateScrollProgress, { passive: true });
  updateScrollProgress();

  if (typewriterTarget) {
    const fullText = typewriterTarget.textContent || '';
    typewriterTarget.textContent = '';

    window.setTimeout(() => {
      let index = 0;
      const typeInterval = window.setInterval(() => {
        typewriterTarget.textContent += fullText.charAt(index);
        index += 1;

        if (index >= fullText.length) {
          clearInterval(typeInterval);
        }
      }, 50);
    }, 800);
  }

  if (hamburgerBtn && mobileMenu) {
    hamburgerBtn.addEventListener('click', () => {
      mobileMenu.classList.toggle('hidden');
    });

    mobileMenu.querySelectorAll('a').forEach((link) => {
      link.addEventListener('click', () => {
        mobileMenu.classList.add('hidden');
      });
    });
  }

  document.querySelectorAll('a[href^="#"]').forEach((anchor) => {
    anchor.addEventListener('click', (event) => {
      const href = anchor.getAttribute('href');
      if (!href || href === '#') {
        return;
      }

      const target = document.querySelector(href);
      if (!target) {
        return;
      }

      event.preventDefault();
      const targetPosition = target.getBoundingClientRect().top + window.scrollY - 80;

      window.scrollTo({
        top: targetPosition,
        behavior: 'smooth'
      });
    });
  });
});
</script>
