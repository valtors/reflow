<header class="sticky top-0 z-50 border-b border-white/10 bg-black/70 backdrop-blur-xl">
  <div class="mx-auto flex w-full max-w-7xl items-center justify-between px-6 py-4 lg:px-8">
    <a href="#" class="group inline-flex items-center gap-3">
      <span class="flex h-11 w-11 items-center justify-center rounded-2xl border border-cyan-400/30 bg-gradient-to-br from-cyan-400/20 via-cyan-300/10 to-teal-500/20 text-xl font-semibold text-cyan-300 shadow-[0_0_28px_rgba(34,211,238,0.35)] ring-1 ring-inset ring-white/10 transition duration-300 group-hover:scale-[1.02] group-hover:shadow-[0_0_36px_rgba(34,211,238,0.45)]">f</span>
      <span class="text-lg font-semibold tracking-[-0.02em] text-white sm:text-xl">
        reflow<span class="text-cyan-400">-ts</span>
      </span>
    </a>

    <nav class="hidden items-center gap-8 md:flex">
      <a href="#why" class="text-sm font-medium text-[#9CA3AF] transition hover:text-white">Why</a>
      <a href="#features" class="text-sm font-medium text-[#9CA3AF] transition hover:text-white">Features</a>
      <a href="#frameworks" class="text-sm font-medium text-[#9CA3AF] transition hover:text-white">Frameworks</a>
      <a href="#benchmarks" class="text-sm font-medium text-[#9CA3AF] transition hover:text-white">Benchmarks</a>
      <a href="https://www.npmjs.com/package/reflow" target="_blank" rel="noreferrer" class="text-sm font-medium text-[#9CA3AF] transition hover:text-white">Docs</a>
    </nav>

    <div class="flex items-center gap-3">
      <a href="#get-started" data-magnetic class="hidden rounded-full bg-orange-500 px-5 py-2.5 text-sm font-semibold text-white shadow-[0_10px_30px_rgba(249,115,22,0.28)] transition duration-300 hover:bg-orange-400 md:inline-flex">Get Started</a>
      <button
        id="hamburger-btn"
        type="button"
        aria-label="Open menu"
        aria-controls="mobile-menu"
        aria-expanded="false"
        class="inline-flex h-11 w-11 items-center justify-center rounded-full border border-white/10 bg-white/5 text-white transition hover:border-cyan-400/40 hover:bg-white/10 md:hidden"
        onclick="const menu=document.getElementById('mobile-menu'); const btn=document.getElementById('hamburger-btn'); menu.classList.remove('pointer-events-none','opacity-0'); menu.classList.add('pointer-events-auto','opacity-100'); btn.setAttribute('aria-expanded','true');"
      >
        <span class="sr-only">Open navigation</span>
        <span class="flex flex-col gap-1.5">
          <span class="block h-0.5 w-5 rounded-full bg-white"></span>
          <span class="block h-0.5 w-5 rounded-full bg-white"></span>
          <span class="block h-0.5 w-5 rounded-full bg-white"></span>
        </span>
      </button>
    </div>
  </div>

  <div id="mobile-menu" class="pointer-events-none fixed inset-0 z-[60] flex min-h-screen items-center justify-center bg-black/80 px-6 opacity-0 backdrop-blur-2xl transition duration-300 md:hidden">
    <button
      type="button"
      aria-label="Close menu"
      class="absolute right-6 top-6 inline-flex h-11 w-11 items-center justify-center rounded-full border border-white/10 bg-white/5 text-white transition hover:border-cyan-400/40 hover:bg-white/10"
      onclick="const menu=document.getElementById('mobile-menu'); const btn=document.getElementById('hamburger-btn'); menu.classList.add('pointer-events-none','opacity-0'); menu.classList.remove('pointer-events-auto','opacity-100'); btn.setAttribute('aria-expanded','false');"
    >
      <span class="sr-only">Close navigation</span>
      <span class="relative block h-5 w-5">
        <span class="absolute left-1/2 top-1/2 h-0.5 w-5 -translate-x-1/2 -translate-y-1/2 rotate-45 rounded-full bg-white"></span>
        <span class="absolute left-1/2 top-1/2 h-0.5 w-5 -translate-x-1/2 -translate-y-1/2 -rotate-45 rounded-full bg-white"></span>
      </span>
    </button>

    <div class="flex flex-col items-center gap-6 text-center">
      <a href="#why" class="text-3xl font-semibold tracking-[-0.03em] text-[#9CA3AF] transition hover:text-white" onclick="document.getElementById('mobile-menu').classList.add('pointer-events-none','opacity-0'); document.getElementById('mobile-menu').classList.remove('pointer-events-auto','opacity-100'); document.getElementById('hamburger-btn').setAttribute('aria-expanded','false');">Why</a>
      <a href="#features" class="text-3xl font-semibold tracking-[-0.03em] text-[#9CA3AF] transition hover:text-white" onclick="document.getElementById('mobile-menu').classList.add('pointer-events-none','opacity-0'); document.getElementById('mobile-menu').classList.remove('pointer-events-auto','opacity-100'); document.getElementById('hamburger-btn').setAttribute('aria-expanded','false');">Features</a>
      <a href="#frameworks" class="text-3xl font-semibold tracking-[-0.03em] text-[#9CA3AF] transition hover:text-white" onclick="document.getElementById('mobile-menu').classList.add('pointer-events-none','opacity-0'); document.getElementById('mobile-menu').classList.remove('pointer-events-auto','opacity-100'); document.getElementById('hamburger-btn').setAttribute('aria-expanded','false');">Frameworks</a>
      <a href="#benchmarks" class="text-3xl font-semibold tracking-[-0.03em] text-[#9CA3AF] transition hover:text-white" onclick="document.getElementById('mobile-menu').classList.add('pointer-events-none','opacity-0'); document.getElementById('mobile-menu').classList.remove('pointer-events-auto','opacity-100'); document.getElementById('hamburger-btn').setAttribute('aria-expanded','false');">Benchmarks</a>
      <a href="https://www.npmjs.com/package/reflow" target="_blank" rel="noreferrer" class="text-3xl font-semibold tracking-[-0.03em] text-[#9CA3AF] transition hover:text-white" onclick="document.getElementById('mobile-menu').classList.add('pointer-events-none','opacity-0'); document.getElementById('mobile-menu').classList.remove('pointer-events-auto','opacity-100'); document.getElementById('hamburger-btn').setAttribute('aria-expanded','false');">Docs</a>
      <a href="#get-started" data-magnetic class="mt-4 inline-flex rounded-full bg-orange-500 px-6 py-3 text-sm font-semibold uppercase tracking-[0.18em] text-white shadow-[0_10px_30px_rgba(249,115,22,0.28)] transition hover:bg-orange-400" onclick="document.getElementById('mobile-menu').classList.add('pointer-events-none','opacity-0'); document.getElementById('mobile-menu').classList.remove('pointer-events-auto','opacity-100'); document.getElementById('hamburger-btn').setAttribute('aria-expanded','false');">Get Started</a>
    </div>
  </div>
</header>
